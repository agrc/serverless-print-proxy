packages:
  - .

minimumReleaseAge: 10080
minimumReleaseAgeStrict: true
minimumReleaseAgeIgnoreMissingTime: false
minimumReleaseAgeExclude:
  - '@ugrc/*'
  - uuid@11.1.1
  - qs@6.15.2
  - hono@4.12.21
  - '@grpc/grpc-js@1.14.4'
  - tmp@0.2.6
  - esbuild@0.28.1
  - ws@8.21.0
  - ws@7.5.11
  - protobufjs@7.6.3
  - form-data@4.0.6
  - tar@7.5.16
  - vite@8.0.16
  - js-yaml@4.1.2
  - '@babel/core@7.29.1'
  - protobufjs@7.6.1
  - '@opentelemetry/core@2.8.0'

allowBuilds:
  esbuild: true
  protobufjs: true
  re2: true

overrides:
  qs@<6.14.1: '>=6.14.1'
  storybook@>=9.0.0 <9.1.17: '>=9.1.17'
  tar@<7.5.7: '>=7.5.7'
  tar@<=7.5.2: '>=7.5.3'
  tar@<=7.5.3: '>=7.5.4'
